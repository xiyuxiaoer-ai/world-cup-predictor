name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "=== remove sync cron (all users) ==="
            crontab -l 2>/dev/null | grep -v sync-matches | crontab - 2>/dev/null
            sudo crontab -l 2>/dev/null | grep -v sync-matches | sudo crontab - 2>/dev/null && echo "root cron cleaned" || echo "no sudo or root cron empty"
            sudo crontab -u root -l 2>/dev/null | grep -v sync-matches | sudo crontab -u root - 2>/dev/null || true
            sudo grep -rl sync-matches /etc/cron.d/ 2>/dev/null | xargs sudo sed -i '/sync-matches/d' 2>/dev/null || true
            echo "=== deploy ==="
            cd /var/www/world-cup-predictor
            git checkout -- .
            git pull
            npm run build && pm2 restart wcp || echo "BUILD FAILED, keeping old version running"
            echo "=== wcp-sync.log (last 5) ==="
            tail -5 /var/log/wcp-sync.log 2>/dev/null || echo "(log not found)"
            echo "=== current crontabs ==="
            crontab -l 2>/dev/null || echo "(user crontab empty)"
            sudo crontab -l 2>/dev/null || echo "(root crontab empty or no sudo)"
            echo "=== systemd timers (sync) ==="
            systemctl list-timers --no-pager 2>/dev/null | grep -i sync || echo "(no sync timer)"
            echo "=== /var/spool/cron/crontabs ==="
            sudo ls /var/spool/cron/crontabs/ 2>/dev/null && sudo grep -rl sync-matches /var/spool/cron/crontabs/ 2>/dev/null || echo "(empty or no access)"
            echo "=== pm2 show wcp ==="
            pm2 show wcp 2>/dev/null | grep -E "script|cron|exec mode|pid|cwd|root|node"
            echo "=== crontab file contents ==="
            sudo cat /var/spool/cron/crontabs/* 2>/dev/null || echo "(no crontab files)"
            echo "=== running curl/sync processes ==="
            ps aux | grep -E "curl|sync-matches" | grep -v grep || echo "(none)"
            echo "=== all cron-related files ==="
            sudo find /etc /var/spool/cron /usr/local/etc -name "*.cron" -o -name "crontab" 2>/dev/null | xargs sudo grep -l sync-matches 2>/dev/null || echo "(none found)"
            echo "=== ALL users crontabs ==="
            for user in $(cut -f1 -d: /etc/passwd); do CRON=$(sudo crontab -u $user -l 2>/dev/null); if [ -n "$CRON" ] && echo "$CRON" | grep -qv "^#"; then echo "--- $user ---"; echo "$CRON"; fi; done || echo "(none)"
            echo "=== /etc/cron.* directories ==="
            sudo ls /etc/cron.hourly/ /etc/cron.daily/ /etc/cron.weekly/ /etc/cron.monthly/ /etc/cron.d/ 2>/dev/null
            sudo grep -rl "sync\|football\|supabase\|wcp" /etc/cron.hourly/ /etc/cron.daily/ /etc/cron.weekly/ /etc/cron.monthly/ /etc/cron.d/ 2>/dev/null | xargs sudo cat 2>/dev/null || echo "(nothing found)"
            echo "=== scripts referencing supabase/football ==="
            sudo find /root /home /var/www /opt /usr/local/bin -type f \( -name "*.js" -o -name "*.sh" -o -name "*.py" -o -name "*.ts" \) 2>/dev/null | xargs sudo grep -l "supabase\|football-data\|sync-match" 2>/dev/null | grep -v "node_modules\|\.next" || echo "(none)"
            echo "=== all listening ports ==="
            ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null
            echo "=== all node/next processes ==="
            ps aux | grep -E "node|next|npm" | grep -v grep || echo "(none)"
            echo "=== pm2 list all ==="
            pm2 list 2>/dev/null
            echo "=== pm2 out log (last 30 lines) ==="
            tail -30 ~/.pm2/logs/wcp-out.log 2>/dev/null || echo "(no out log)"
            echo "=== nginx access log (last 10) ==="
            sudo tail -10 /var/log/nginx/access.log 2>/dev/null || echo "(no nginx log)"
