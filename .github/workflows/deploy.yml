name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "=== remove sync cron (all users) ==="
            crontab -l 2>/dev/null | grep -v sync-matches | crontab - 2>/dev/null
            sudo crontab -l 2>/dev/null | grep -v sync-matches | sudo crontab - 2>/dev/null && echo "root cron cleaned" || echo "no sudo or root cron empty"
            sudo crontab -u root -l 2>/dev/null | grep -v sync-matches | sudo crontab -u root - 2>/dev/null || true
            sudo grep -rl sync-matches /etc/cron.d/ 2>/dev/null | xargs sudo sed -i '/sync-matches/d' 2>/dev/null || true
            echo "=== deploy ==="
            cd /var/www/world-cup-predictor
            git checkout -- .
            git pull
            npm run build && pm2 restart wcp || echo "BUILD FAILED, keeping old version running"
            echo "=== wcp-sync.log (last 5) ==="
            tail -5 /var/log/wcp-sync.log 2>/dev/null || echo "(log not found)"
            echo "=== current crontabs ==="
            crontab -l 2>/dev/null || echo "(user crontab empty)"
            sudo crontab -l 2>/dev/null || echo "(root crontab empty or no sudo)"
