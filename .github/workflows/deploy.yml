name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "=== user crontab ===" && crontab -l 2>/dev/null || echo "(empty)"
            echo "=== /etc/cron.d/ ===" && ls /etc/cron.d/ 2>/dev/null && grep -r sync-matches /etc/cron.d/ 2>/dev/null || echo "(no match)"
            echo "=== /etc/crontab ===" && grep sync-matches /etc/crontab 2>/dev/null || echo "(no match)"
            echo "=== wcp-sync.log (last 10) ===" && tail -10 /var/log/wcp-sync.log 2>/dev/null || echo "(no log)"
            echo "=== all crontabs ===" && for u in $(cut -f1 -d: /etc/passwd); do crontab -l -u $u 2>/dev/null | grep -q sync-matches && echo "$u has sync cron"; done
            crontab -l 2>/dev/null | grep -v sync-matches | crontab - 2>/dev/null
            cd /var/www/world-cup-predictor
            git checkout -- .
            git pull
            npm run build && pm2 restart wcp || echo "BUILD FAILED, keeping old version running"
